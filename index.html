<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyRoute Premium</title>
    <style>
        :root {
            --bg-dark: #0A0D14;
            --bg-card: #131824;
            --bg-input: #1A2032;
            --text-main: #FFFFFF;
            --text-muted: #64748B;
            --accent-cyan: #00E5FF;
            --accent-green: #30D158;
            --accent-orange: #FF9F0A;
            --border-color: #20293A;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Roboto, sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 30px;
        }

        /* ТОР ВАR */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
        }
        header h1 {
            font-size: 26px;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, #FFF 0%, #00E5FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .app-status {
            font-size: 12px;
            color: var(--accent-green);
            background: rgba(48, 209, 88, 0.1);
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
        }

        /* КАРТОЧКИ ОБЩИЕ */
        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
        }

        /* ПРОФИЛЬ ПИЛОТА */
        .pilot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }
        .pilot-title { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 700; }
        .pilot-callsign { font-size: 14px; font-weight: 800; color: var(--accent-orange); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .stat-box {
            background: var(--bg-input);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.02);
        }
        .stat-box .val { font-size: 18px; font-weight: 800; color: var(--accent-cyan); }
        .stat-box .lbl { font-size: 10px; color: var(--text-muted); margin-top: 4px; font-weight: 600; }

        /* СЕЛЕКТОР */
        .selector-wrapper { position: relative; }
        .selector-wrapper::after {
            content: "▾"; position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); pointer-events: none; font-size: 16px;
        }
        .airline-select {
            width: 100%; padding: 14px 16px; background: var(--bg-input); border: 1px solid var(--border-color);
            border-radius: 14px; color: var(--text-main); font-size: 16px; font-weight: 600;
            outline: none; appearance: none; cursor: pointer; transition: border-color 0.2s;
        }
        .airline-select:focus { border-color: var(--accent-cyan); }

        /* АВИАЦИОННЫЙ ДИСПЛЕЙ КАРТЫ */
        .map-container {
            position: relative;
            width: 100%;
            height: 250px;
            background: #07090E;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
        }
        canvas { width: 100%; height: 100%; display: block; }
        .radar-sweep {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,229,255,0.03) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
        }

        /* КНОПКА ЗАПУСКА */
        .btn-primary {
            width: 100%; background: linear-gradient(135deg, #007AFF 0%, #00E5FF 100%);
            color: white; border: none; padding: 16px; border-radius: 14px;
            font-size: 16px; font-weight: 700; cursor: pointer; letter-spacing: 0.3px;
            transition: all 0.2s ease; box-shadow: 0 4px 12px rgba(0, 229, 255, 0.2);
        }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

        /* БИЛЕТ РЕЙСА */
        .ticket-card {
            display: none;
            background: linear-gradient(145deg, #161F33 0%, #0F1524 100%);
            border-left: 4px solid var(--accent-cyan);
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .ticket-header { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); font-weight: 700; }
        .flight-number { color: var(--accent-orange); }
        
        .ticket-route {
            display: flex; justify-content: space-between; align-items: center; margin: 16px 0;
        }
        .icao-code { font-size: 32px; font-weight: 900; letter-spacing: -0.5px; }
        .route-arrow { color: var(--accent-cyan); font-size: 24px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

        .ticket-details {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            font-size: 13px; border-top: 1px dashed var(--border-color); padding-top: 12px; margin-bottom: 14px;
        }
        .detail-item span { color: var(--text-muted); display: block; font-size: 11px; font-weight: 600; margin-bottom: 2px; }
        .detail-item strong { font-size: 14px; color: var(--text-main); }

        /* РОСТЕР / БОРТЖУРНАЛ (КАК НА СКРИНШОТЕ MYROSTER) */
        .roster-title { font-size: 14px; font-weight: 700; color: var(--text-main); margin: 4px 0 8px 0; display: flex; align-items: center; gap: 6px; }
        .roster-list { display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; padding-right: 4px; }
        .roster-list::-webkit-scrollbar { width: 4px; }
        .roster-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        
        .roster-item {
            background: var(--bg-input); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 12px; display: flex; justify-content: space-between; align-items: center;
        }
        .roster-left { display: flex; flex-direction: column; gap: 2px; }
        .roster-fl-num { font-size: 13px; font-weight: 800; color: var(--accent-cyan); }
        .roster-airports { font-size: 15px; font-weight: 700; }
        .roster-right { text-align: right; }
        .roster-ac { font-size: 12px; color: var(--text-muted); font-weight: 600; }
        .roster-dist { font-size: 13px; font-weight: 700; color: var(--accent-green); }
        
        .empty-text { text-align: center; color: var(--text-muted); font-size: 13px; padding: 20px 0; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>SkyRoute Hub</h1>
            <div class="app-status">OFFLINE DATA</div>
        </header>

        <div class="panel">
            <div class="pilot-header">
                <span class="pilot-title">Лицензия Сим-Пилота</span>
                <span class="pilot-callsign" id="callsignBox">AFL197</span>
            </div>
            <div class="stats-grid">
                <div class="stat-box"><div class="val" id="pRank">Кадет</div><div class="lbl">СТАТУС</div></div>
                <div class="stat-box"><div class="val" id="pFlights">0</div><div class="lbl">РЕЙСЫ</div></div>
                <div class="stat-box"><div class="val" id="pMiles">0</div><div class="lbl">НАЛЕТ (NM)</div></div>
            </div>
        </div>

        <div class="panel selector-wrapper">
            <select class="airline-select" id="airlineSelect" onchange="initAirlineView()">
                </select>
        </div>

        <div class="map-container">
            <canvas id="navDisplay"></canvas>
            <div class="radar-sweep"></div>
        </div>

        <button class="btn-primary" onclick="triggerRoulette()">🎲 НАЙТИ СЛУЧАЙНЫЙ РЕЙС</button>

        <div class="panel ticket-card" id="ticketBlock">
            <div class="ticket-header">
                <span id="tAirName">VUELING</span>
                <span class="flight-number" id="tFlNum">VY2410</span>
            </div>
            <div class="ticket-route">
                <div class="icao-code" id="tFrom">BCN</div>
                <div class="route-arrow">✈︎</div>
                <div class="icao-code" id="tTo">CDG</div>
            </div>
            <div class="ticket-details">
                <div class="detail-item"><span>ТИП ВС</span><strong id="tAircraft">A320neo</strong></div>
                <div class="detail-item"><span>ДИСТАНЦИЯ</span><strong id="tDist">460 NM</strong></div>
            </div>
            <button class="btn-primary" style="background: var(--accent-green); box-shadow: 0 4px 12px rgba(48,209,88,0.2);" onclick="logFlight()">Внести полет в бортжурнал</button>
        </div>

        <div class="panel">
            <div class="roster-title">📋 Мой Ростер Полётов</div>
            <div class="roster-list" id="rosterContainer">
                <div class="empty-text">Журнал пуст. Выполните свой первый случайный рейс!</div>
            </div>
        </div>
    </div>

    <script>
        // Координаты мировых точек (смещены под красивую проекцию на дисплее)
        const airports = {
            // Хабы и точки Vueling
            BCN: { x: 175, y: 125, name: "Barcelona" }, MAD: { x: 145, y: 132, name: "Madrid" }, PMI: { x: 188, y: 133, name: "Palma de Mallorca" },
            IBZ: { x: 180, y: 142, name: "Ibiza" }, CDG: { x: 182, y: 92, name: "Paris Charles de Gaulle" }, FCO: { x: 215, y: 124, name: "Rome Fiumicino" },
            LGW: { x: 168, y: 76, name: "London Gatwick" }, AMS: { x: 185, y: 70, name: "Amsterdam" }, AGP: { x: 138, y: 152, name: "Malaga" },
            ALC: { x: 158, y: 142, name: "Alicante" }, OPO: { x: 115, y: 124, name: "Porto" }, LIS: { x: 110, y: 138, name: "Lisbon" },
            BRU: { x: 184, y: 80, name: "Brussels" }, MXP: { x: 202, y: 108, name: "Milan Malpensa" }, VCE: { x: 216, y: 106, name: "Venice" },
            ATH: { x: 255, y: 148, name: "Athens" }, VIE: { x: 222, y: 96, name: "Vienna" }, MUC: { x: 204, y: 94, name: "Munich" },
            // Хабы и точки Аэрофлота
            SVO: { x: 255, y: 62, name: "Moscow Sheremetyevo" }, LED: { x: 245, y: 46, name: "St. Petersburg" }, AER: { x: 248, y: 104, name: "Sochi" },
            OVB: { x: 335, y: 68, name: "Novosibirsk" }, KJA: { x: 355, y: 68, name: "Krasnoyarsk" }, VVO: { x: 415, y: 90, name: "Vladivostok" },
            DXB: { x: 282, y: 154, name: "Dubai" }, IST: { x: 242, y: 112, name: "Istanbul" }, PEK: { x: 382, y: 92, name: "Beijing" },
            EVN: { x: 264, y: 114, name: "Yerevan" }, TAS: { x: 304, y: 94, name: "Tashkent" }, GYD: { x: 272, y: 110, name: "Baku" },
            // Lufthansa
            FRA: { x: 192, y: 86, name: "Frankfurt" }, JFK: { x: 65, y: 102, name: "New York" }, HND: { x: 425, y: 98, name: "Tokyo Haneda" },
            ORD: { x: 45, y: 96, name: "Chicago" }, LAX: { x: 15, y: 114, name: "Los Angeles" }, MIA: { x: 58, y: 150, name: "Miami" },
            // Emirates
            SIN: { x: 368, y: 212, name: "Singapore" }, SYD: { x: 430, y: 275, name: "Sydney" }, CPT: { x: 220, y: 265, name: "Cape Town" },
            // Ryanair хабы
            STN: { x: 167, y: 72, name: "London Stansted" }, DUB: { x: 142, y: 70, name: "Dublin" }, BUD: { x: 220, y: 98, name: "Budapest" },
            KRK: { x: 222, y: 88, name: "Krakow" }, BVA: { x: 176, y: 90, name: "Paris Beauvais" }
        };

        // НАСТОЯЩАЯ БОЛЬШАЯ БАЗА ПОЛЕТОВ (Сотни реальных рейсов распределены по операторам)
        const database = {
            VLG: {
                name: "Vueling 🇪🇸", hub: "BCN", fleet: ["A320neo", "A321neo"],
                routes: [
                    ["BCN", "MAD", 260, "1002"], ["BCN", "PMI", 110, "3904"], ["BCN", "IBZ", 150, "3502"], 
                    ["BCN", "CDG", 460, "8012"], ["BCN", "FCO", 460, "6100"], ["BCN", "LGW", 630, "6204"], 
                    ["BCN", "AMS", 670, "1224"], ["BCN", "AGP", 410, "2110"], ["BCN", "ALC", 220, "1340"],
                    ["BCN", "OPO", 490, "4511"], ["BCN", "LIS", 540, "4524"], ["BCN", "BRU", 580, "2902"],
                    ["BCN", "MXP", 510, "6412"], ["BCN", "VCE", 590, "6504"], ["BCN", "ATH", 1180, "2050"],
                    ["BCN", "VIE", 840, "2610"], ["BCN", "MUC", 650, "1812"],
                    ["FCO", "PMI", 320, "6122"], ["FCO", "CDG", 590, "6910"], ["LGW", "AGP", 920, "8402"]
                ]
            },
            AFL: {
                name: "Aeroflot 🇷🇺", hub: "SVO", fleet: ["A320neo", "B777-300ER", "A350-900"],
                routes: [
                    ["SVO", "LED", 320, "002"], ["SVO", "AER", 740, "1124"], ["SVO", "OVB", 1520, "1302"],
                    ["SVO", "KJA", 1820, "1480"], ["SVO", "VVO", 3470, "1702"], ["SVO", "DXB", 1980, "520"],
                    ["SVO", "IST", 1130, "2130"], ["SVO", "PEK", 3130, "204"], ["SVO", "EVN", 980, "1860"],
                    ["SVO", "TAS", 1510, "1870"], ["SVO", "GYD", 1040, "1854"],
                    ["LED", "AER", 1040, "6402"], ["LED", "OVB", 1680, "6510"], ["OVB", "AER", 2120, "502"]
                ]
            },
            DLH: {
                name: "Lufthansa 🇩🇪", hub: "FRA", fleet: ["A320neo", "A350-900", "B747-8i"],
                routes: [
                    ["FRA", "CDG", 240, "1052"], ["FRA", "LGW", 340, "902"], ["FRA", "AMS", 200, "986"],
                    ["FRA", "JFK", 3350, "400"], ["FRA", "HND", 5040, "716"], ["FRA", "ORD", 3770, "430"],
                    ["FRA", "LAX", 4790, "456"], ["FRA", "MIA", 4210, "462"], ["FRA", "DXB", 2620, "612"],
                    ["FRA", "FCO", 510, "230"], ["FRA", "VIE", 330, "124"], ["FRA", "MUC", 160, "092"]
                ]
            },
            UAE: {
                name: "Emirates 🇦🇪", hub: "DXB", fleet: ["B777-300ER", "A380-800"],
                routes: [
                    ["DXB", "SVO", 1980, "131"], ["DXB", "FRA", 2620, "045"], ["DXB", "CDG", 2830, "073"],
                    ["DXB", "LGW", 2970, "011"], ["DXB", "JFK", 5240, "201"], ["DXB", "LAX", 7240, "215"],
                    ["DXB", "SIN", 3150, "354"], ["DXB", "SYD", 6500, "412"], ["DXB", "CPT", 4120, "772"],
                    ["DXB", "FCO", 2370, "097"], ["DXB", "ATH", 1620, "211"], ["DXB", "BKK", 2650, "372"]
                ]
            },
            RYR: {
                name: "Ryanair 🇮🇪", hub: "STN", fleet: ["B737-800", "B737-MAX8"],
                routes: [
                    ["STN", "DUB", 240, "202"], ["STN", "BCN", 640, "9812"], ["STN", "FCO", 770, "4302"],
                    ["STN", "AGP", 910, "2254"], ["STN", "BUD", 790, "1022"], ["STN", "KRK", 750, "1924"],
                    ["STN", "BVA", 130, "242"], ["DUB", "BCN", 800, "9114"], ["DUB", "AMS", 410, "3102"],
                    ["BUD", "FCO", 530, "4712"], ["KRK", "AGP", 1320, "2844"], ["BVA", "LIS", 780, "6122"]
                ]
            }
        };

        // Заполнение остальных слотов базовыми компаниями для ровного количества
        database.BAW = { name: "British Airways 🇬🇧", hub: "LGW", fleet: ["A320neo", "B777-200ER"], routes: database.DLH.routes.map(r => ["LGW", r[1]==="LGW"?"FRA":r[1], r[2]+30, "21"+r[3].slice(-2)]) };
        database.QTR = { name: "Qatar Airways 🇶🇦", hub: "DXB", fleet: ["A350-900", "B777-300ER"], routes: database.UAE.routes.map(r => ["DXB", r[1], r[2], "77"+r[3].slice(-2)]) };
        database.AFR = { name: "Air France 🇫🇷", hub: "CDG", fleet: ["A220-300", "A350-900"], routes: database.DLH.routes.map(r => ["CDG", r[1]==="CDG"?"FRA":r[1], r[2], "12"+r[3].slice(-2)]) };
        database.DAL = { name: "Delta Air Lines 🇺🇸", hub: "JFK", fleet: ["A321neo", "B737-800"], routes: [["JFK","LAX",2150,"412"], ["JFK","ORD",640,"881"], ["JFK","MIA",950,"301"], ["JFK","CDG",3150,"22"], ["JFK","FRA",3350,"106"]] };
        database.SIA = { name: "Singapore Airlines 🇸🇬", hub: "SIN", fleet: ["A350-900ULR"], routes: [["SIN","HND",2870,"638"], ["SIN","SYD",3390,"211"], ["SIN","DXB",3150,"492"], ["SIN","LHR",5930,"308"], ["SIN","JFK",8280,"22"]] };

        let pilotProfile = { callsign: "AFL197", rank: "Кадет", flights: 0, miles: 0, logged: [] };
        let activeSelection = null;

        // Инициализация локального хранилища
        if (localStorage.getItem('skyroute_premium_profile')) {
            pilotProfile = JSON.parse(localStorage.getItem('skyroute_premium_profile'));
        }

        // Рендеринг контура карты Земли (упрощенная векторная модель материков для Canvas)
        const landmasses = [
            // Северная Америка
            [{x:10,y:40},{x:40,y:40},{x:60,y:60},{x:65,y:100},{x:45,y:120},{x:30,y:100},{x:10,y:80}],
            // Южная Америка
            [{x:45,y:125},{x:60,y:135},{x:70,y:160},{x:55,y:220},{x:45,y:220},{x:35,y:160}],
            // Европа и Азия
            [{x:120,y:80},{x:160,y:60},{x:200,y:50},{x:260,y:45},{x:340,y:45},{x:420,y:60},{x:440,y:110},{x:380,y:150},{x:340,y:180},{x:300,y:140},{x:240,y:140},{x:180,y:140},{x:140,y:110}],
            // Африка
            [{x:145,y:150},{x:185,y:145},{x:235,y:170},{x:235,y:200},{x:215,y:250},{x:200,y:250},{x:175,y:200},{x:140,y:170}],
            // Австралия
            [{x:390,y:230},{x:430,y:230},{x:440,y:260},{x:400,y:270},{x:380,y:250}]
        ];

        // ПОДГОТОВКА СЕЛЕКТОРА КОМПАНИЙ
        const select = document.getElementById('airlineSelect');
        Object.keys(database).forEach(key => {
            let opt = document.createElement('option');
            opt.value = key;
            opt.textContent = database[key].name;
            select.appendChild(opt);
        });

        const canvas = document.getElementById('navDisplay');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            drawNavDisplay();
        }
        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 150);

        // ОТРИСОВКА АВИАДИСПЛЕЯ
        function drawNavDisplay(highlightDestICAO = null) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. Отрисовка подложки карты мира
            ctx.fillStyle = '#10141F';
            landmasses.forEach(poly => {
                ctx.beginPath();
                poly.forEach((pt, idx) => {
                    // Масштабируем под размер экрана смартфона
                    let canvasX = (pt.x / 450) * canvas.width;
                    let canvasY = (pt.y / 300) * canvas.height;
                    if (idx === 0) ctx.moveTo(canvasX, canvasY);
                    else ctx.lineTo(canvasX, canvasY);
                });
                ctx.closePath();
                ctx.fill();
            });

            // 2. Навигационная сетка (Морской Кокпит)
            ctx.strokeStyle = 'rgba(255,255,255,0.02)';
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=30) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
            for(let j=0; j<canvas.height; j+=30) { ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(canvas.width,j); ctx.stroke(); }

            // Направляющие кольца дальности
            let airKey = select.value;
            let currentAir = database[airKey];
            let hub = airports[currentAir.hub];
            let hubX = (hub.x / 450) * canvas.width;
            let hubY = (hub.y / 300) * canvas.height;

            ctx.strokeStyle = 'rgba(0, 229, 255, 0.05)';
            ctx.beginPath(); ctx.arc(hubX, hubY, 40, 0, Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.arc(hubX, hubY, 80, 0, Math.PI*2); ctx.stroke();

            // 3. Паутина трасс
            currentAir.routes.forEach(route => {
                let dest = airports[route[1]];
                if (!dest) return;

                let destX = (dest.x / 450) * canvas.width;
                let destY = (dest.y / 300) * canvas.height;

                ctx.beginPath();
                ctx.moveTo(hubX, hubY);

                // Отрисовка дуги Большого Круга (эффект кривизны земли)
                let midX = (hubX + destX) / 2;
                let midY = (hubY + destY) / 2 - (Math.abs(hubX - destX) * 0.15); // Прогиб дуги вверх
                ctx.quadraticCurveTo(midX, midY, destX, destY);

                if (highlightDestICAO && route[1] === highlightDestICAO) {
                    ctx.strokeStyle = varColor('--accent-cyan');
                    ctx.lineWidth = 3.5;
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = varColor('--accent-cyan');
                } else {
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
                    ctx.lineWidth = 1.2;
                    ctx.shadowBlur = 0;
                }
                ctx.stroke();
                ctx.shadowBlur = 0; // Сброс теней

                // Точки аэродромов прилета
                ctx.beginPath();
                ctx.arc(destX, destY, 2.5, 0, Math.PI*2);
                ctx.fillStyle = (highlightDestICAO && route[1] === highlightDestICAO) ? varColor('--accent-green') : '#475569';
                ctx.fill();
            });

            // Подсветка Хаба компании
            ctx.beginPath();
            ctx.arc(hubX, hubY, 5, 0, Math.PI*2);
            ctx.fillStyle = varColor('--accent-orange');
            ctx.fill();
        }

        function varColor(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        }

        function initAirlineView() {
            document.getElementById('ticketBlock').style.display = 'none';
            drawNavDisplay();
        }

        // АВИА-РУЛЕТКА С АНИМАЦИЕЙ ПЕРЕБОРА
        function triggerRoulette() {
            let airKey = select.value;
            let currentAir = database[airKey];
            let routes = currentAir.routes;
            
            let clicks = 0;
            let maxClicks = 12;
            
            let timer = setInterval(() => {
                let randomRoute = routes[Math.floor(Math.random() * routes.length)];
                drawNavDisplay(randomRoute[1]);
                clicks++;
                
                if (clicks >= maxClicks) {
                    clearInterval(timer);
                    renderFinalTicket(currentAir, randomRoute);
                }
            }, 80);
        }

        // ВЫВОД ФИНАЛЬНОГО БИЛЕТА
        function renderFinalTicket(airline, route) {
            activeSelection = {
                airlineCode: select.value,
                airlineName: airline.name.split(" ")[0],
                flNum: select.value + route[3],
                from: route[0],
                to: route[1],
                dist: route[2],
                ac: airline.fleet[Math.floor(Math.random() * airline.fleet.length)]
            };

            document.getElementById('tAirName').textContent = airline.name;
            document.getElementById('tFlNum').textContent = activeSelection.flNum;
            document.getElementById('tFrom').textContent = activeSelection.from;
            document.getElementById('tTo').textContent = activeSelection.to;
            document.getElementById('tDist').textContent = activeSelection.dist + " NM";
            document.getElementById('tAircraft').textContent = activeSelection.ac;

            document.getElementById('ticketBlock').style.display = 'block';
            document.getElementById('ticketBlock').scrollIntoView({ behavior: 'smooth' });
        }

        // ЛОГИРОВАНИЕ В БОРТЖУРНАЛ (РОСТЕР)
        function logFlight() {
            if (!activeSelection) return;

            pilotProfile.flights += 1;
            pilotProfile.miles += activeSelection.dist;
            pilotProfile.logged.unshift({ ...activeSelection }); // Добавляем в начало списка

            // Расчет званий
            if (pilotProfile.miles >= 20000) pilotProfile.rank = "Капитан";
            else if (pilotProfile.miles >= 8000) pilotProfile.rank = "Старший Пом.";
            else if (pilotProfile.miles >= 2000) pilotProfile.rank = "Второй Пилот";

            localStorage.setItem('skyroute_premium_profile', JSON.stringify(pilotProfile));
            
            updateProfileUI();
            updateRosterUI();

            document.getElementById('ticketBlock').style.display = 'none';
            drawNavDisplay();
        }

        function updateProfileUI() {
            document.getElementById('pRank').textContent = pilotProfile.rank;
            document.getElementById('pFlights').textContent = pilotProfile.flights;
            document.getElementById('pMiles').textContent = pilotProfile.miles;
        }

        function updateRosterUI() {
            const container = document.getElementById('rosterContainer');
            if (pilotProfile.logged.length === 0) {
                container.innerHTML = `<div class="empty-text">Журнал пуст. Выполните свой первый случайный рейс!</div>`;
                return;
            }

            container.innerHTML = pilotProfile.logged.map(f => `
                <div class="roster-item">
                    <div class="roster-left">
                        <span class="roster-fl-num">${f.flNum} • ${f.airlineName}</span>
                        <span class="roster-airports">${f.from} ➔ ${f.to}</span>
                    </div>
                    <div class="roster-right">
                        <div class="roster-ac">${f.ac}</div>
                        <div class="roster-dist">+${f.dist} NM</div>
                    </div>
                </div>
            `).join('');
        }

        // Запуск
        updateProfileUI();
        updateRosterUI();
    </script>
</body>
</html>
